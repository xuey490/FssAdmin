# Casbin RBAC 模型配置
# g  : 用户-角色关系
# g2 : 扩展角色关系（预留）
#
# 匹配器特性：
# - keyMatch2: 支持 /api/users/:id
# - keyMatch : 支持 /api/users/*
# - act == "*" 支持动作通配符
[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _
g2 = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && (keyMatch2(r.obj, p.obj) || keyMatch(r.obj, p.obj)) && (r.act == p.act || p.act == "*")
